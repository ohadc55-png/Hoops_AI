<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HOOPS AI - Parent Register</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/variables.css">
  <link rel="stylesheet" href="/static/css/reset.css">
  <link rel="stylesheet" href="/static/css/main.css">
  <style>
    .auth-page.parent-auth {
      --primary: #ea580c; --primary-light: #f97316; --primary-dark: #c2410c;
      --primary-glow: rgba(234,88,12,0.2); --primary-ghost: rgba(234,88,12,0.08);
      --bg: #0f0c0a; --bg-raised: #1a1512;
      --border: rgba(214,211,209,0.1);
      --text: #fef3c7; --text-secondary: #d6d3d1; --text-muted: #78716c; --text-inverse: #fff;
    }
    .auth-page { min-height:100vh; display:flex; align-items:center; justify-content:center; background:var(--bg); padding:var(--sp-4); }
    .auth-card { width:100%; max-width:480px; background:var(--bg-raised); border:1px solid var(--border); border-radius:var(--r-2xl); padding:var(--sp-8); box-shadow: 0 0 40px rgba(234,88,12,0.06); }
    .auth-logo { display:flex; align-items:center; gap:var(--sp-3); margin-bottom:var(--sp-6); justify-content:center; }
    .auth-logo-img { width:48px;height:48px;max-width:48px;max-height:48px;border-radius:var(--r-xl);object-fit:contain; }
    .auth-logo h1 { font-size:var(--text-2xl); font-weight:700; color:var(--text); }
    .auth-subtitle { text-align:center; color:var(--text-secondary); margin-bottom:var(--sp-6); font-size:var(--text-sm); }
    .auth-form { display:flex; flex-direction:column; gap:var(--sp-4); }
    .auth-footer { text-align:center; margin-top:var(--sp-6); font-size:var(--text-sm); color:var(--text-muted); }
    .auth-footer a { color:var(--primary-light); }
    .auth-error { background:rgba(239,68,68,0.1); color:#ef4444; padding:var(--sp-3) var(--sp-4); border-radius:var(--r-lg); border-right:4px solid #ef4444; font-size:var(--text-sm); font-weight:500; display:none; align-items:center; gap:var(--sp-2); direction:rtl; text-align:right; margin-bottom:var(--sp-2); animation:authErrorIn 0.3s ease; }
    .auth-error .material-symbols-outlined { font-size:20px; flex-shrink:0; }
    @keyframes authErrorIn { from { opacity:0; transform:translateY(-6px); } to { opacity:1; transform:translateY(0); } }
    .team-info { background:var(--success-bg); color:var(--success); padding:var(--sp-3); border-radius:var(--r-lg); font-size:var(--text-sm); display:none; }
  </style>
</head>
<body>
  <div class="auth-page parent-auth">
    <div class="auth-card">
      <div class="auth-logo">
        <img src="/static/images/logo.png" alt="HOOPS AI" class="auth-logo-img" width="48" height="48">
        <h1>HOOPS AI</h1>
      </div>
      <div class="auth-subtitle">Parent Registration</div>

      <div class="auth-error" id="authError"></div>
      <div class="team-info" id="teamInfo"></div>

      <form class="auth-form" id="registerForm" onsubmit="return handleParentRegister(event)">
        <div class="input-group">
          <label>Full Name</label>
          <input type="text" class="input" id="name" placeholder="Your name" required>
        </div>
        <div class="input-group">
          <label>Date of Birth</label>
          <input type="date" class="input" id="dateOfBirth">
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:var(--sp-3);">
          <div class="input-group">
            <label>Email</label>
            <input type="email" class="input" id="email" placeholder="parent@example.com" required>
            <small style="color:var(--text-muted);font-size:11px;margin-top:2px;display:block;">Use your child's email to auto-link</small>
          </div>
          <div class="input-group">
            <label>Phone</label>
            <input type="tel" class="input" id="phone" placeholder="050-1234567">
          </div>
        </div>
        <div class="input-group">
          <label>Password</label>
          <input type="password" class="input" id="password" placeholder="Min 6 characters" minlength="6" required>
        </div>
        <div class="input-group" id="inviteCodeGroup">
          <label>Invite Code</label>
          <input type="text" class="input" id="inviteCode" placeholder="6-character code from the team" maxlength="6" style="text-transform:uppercase;">
        </div>
        <input type="hidden" id="inviteLinkToken" value="">
        <button type="submit" class="btn btn-primary btn-lg w-full" id="registerBtn">
          <span class="material-symbols-outlined">person_add</span>
          Join Team
        </button>
      </form>

      <div class="auth-footer">
        Already have an account? <a href="/parent/login">Sign in</a>
        <br><br>
        <a href="/player/register" style="color:var(--text-muted);">Player? Register here</a>
      </div>
    </div>
  </div>

  <div class="toast-container" id="toastContainer"></div>
  <script src="/static/js/parent_main.js"></script>
  <script>
    // Check for invite link token from URL
    (function() {
      const inviteToken = '{{ invite_token | default("") }}';
      if (inviteToken) {
        document.getElementById('inviteLinkToken').value = inviteToken;
        document.getElementById('inviteCodeGroup').style.display = 'none';
        // Validate invite link and show team name
        fetch('/api/teams/validate/' + inviteToken)
          .then(r => r.json())
          .then(res => {
            if (res && res.data) {
              const info = document.getElementById('teamInfo');
              info.textContent = 'Joining team: ' + res.data.name;
              info.style.display = 'block';
            }
          }).catch(() => {
            const err = document.getElementById('authError');
            err.innerHTML = '<span class="material-symbols-outlined">error</span>לינק הזמנה לא תקין או שפג תוקפו';
            err.style.display = 'flex';
          });
      }
    })();

    async function handleParentRegister(e) {
      e.preventDefault();
      const btn = document.getElementById('registerBtn');
      btn.disabled = true;

      const inviteLinkToken = document.getElementById('inviteLinkToken').value;
      const inviteCode = document.getElementById('inviteCode').value.trim().toUpperCase();

      if (!inviteLinkToken && !inviteCode) {
        const err = document.getElementById('authError');
        err.innerHTML = '<span class="material-symbols-outlined">error</span>יש להזין קוד הזמנה';
        err.style.display = 'flex';
        btn.disabled = false;
        return false;
      }

      try {
        const body = {
          name: document.getElementById('name').value,
          email: document.getElementById('email').value,
          password: document.getElementById('password').value,
          phone: document.getElementById('phone').value.trim() || null,
          date_of_birth: document.getElementById('dateOfBirth').value || null,
        };
        if (inviteLinkToken) {
          body.invite_link_token = inviteLinkToken;
        } else {
          body.invite_code = inviteCode;
        }
        const res = await ParentAPI.post('/api/parent-auth/register', body);
        ParentAPI.setAuth(res.data.token, res.data.user);
        window.location.href = '/parent';
      } catch (err) {
        const errEl = document.getElementById('authError');
        errEl.innerHTML = '<span class="material-symbols-outlined">error</span>' + (err.message || 'ההרשמה נכשלה');
        errEl.style.display = 'flex';
      } finally {
        btn.disabled = false;
      }
      return false;
    }
  </script>
</body>
</html>
