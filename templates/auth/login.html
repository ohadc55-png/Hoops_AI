<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HOOPS AI - Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/variables.css">
  <link rel="stylesheet" href="/static/css/reset.css">
  <link rel="stylesheet" href="/static/css/main.css">
  <style>
    .auth-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg);
      padding: var(--sp-4);
    }
    .auth-card {
      width: 100%;
      max-width: 420px;
      background: var(--bg-raised);
      border: 1px solid var(--border);
      border-radius: var(--r-2xl);
      padding: var(--sp-10);
    }
    .auth-logo {
      display: flex; align-items: center; gap: var(--sp-3);
      margin-bottom: var(--sp-8); justify-content: center;
    }
    .auth-logo-img {
      width: 48px; height: 48px; max-width: 48px; max-height: 48px; border-radius: var(--r-xl); object-fit: contain;
    }
    .auth-logo h1 { font-size: var(--text-2xl); font-weight: 700; }
    .auth-form { display: flex; flex-direction: column; gap: var(--sp-4); }
    .auth-footer { text-align: center; margin-top: var(--sp-6); font-size: var(--text-sm); color: var(--text-muted); }
    .auth-error { background: rgba(239,68,68,0.1); color: #ef4444; padding: var(--sp-3) var(--sp-4); border-radius: var(--r-lg); border-right: 4px solid #ef4444; font-size: var(--text-sm); font-weight: 500; display: none; align-items: center; gap: var(--sp-2); direction: rtl; text-align: right; margin-bottom: var(--sp-2); animation: authErrorIn 0.3s ease; }
    .auth-error .material-symbols-outlined { font-size: 20px; flex-shrink: 0; }
    @keyframes authErrorIn { from { opacity: 0; transform: translateY(-6px); } to { opacity: 1; transform: translateY(0); } }
    .invite-banner { background: rgba(244,140,37,0.12); border: 1px solid var(--primary); padding: var(--sp-3) var(--sp-4); border-radius: var(--r-lg); font-size: var(--text-sm); color: var(--text); margin-bottom: var(--sp-4); display: none; text-align: center; }
    .invite-banner strong { color: var(--primary); }
  </style>
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">
      <div class="auth-logo">
        <img src="/static/images/logo.png" alt="HOOPS AI" class="auth-logo-img" width="48" height="48">
        <h1>HOOPS AI</h1>
      </div>

      <div class="invite-banner" id="inviteBanner"></div>
      <div class="auth-error" id="authError"></div>

      <form class="auth-form" id="loginForm" onsubmit="return handleLogin(event)">
        <div class="input-group">
          <label>Email</label>
          <input type="email" class="input" id="email" placeholder="coach@example.com" required>
        </div>
        <div class="input-group">
          <label>Password</label>
          <input type="password" class="input" id="password" placeholder="Enter your password" required>
        </div>
        <button type="submit" class="btn btn-primary btn-lg w-full" id="loginBtn">
          <span class="material-symbols-outlined">login</span>
          Sign In
        </button>
      </form>

      <div class="auth-footer">
        Don't have an account? <a href="/register" id="registerLink">Create one</a>
      </div>
    </div>
  </div>

  <div class="toast-container" id="toastContainer"></div>
  <script src="/static/js/shared-utils.js"></script>
  <script src="/static/js/api-core.js"></script>
  <script src="/static/js/main.js"></script>
  <script>
    const COACH_INVITE_TOKEN = '{{ coach_invite_token | default("") }}';

    // Show invite banner and update register link if coming from invite
    if (COACH_INVITE_TOKEN) {
      document.getElementById('registerLink').href = '/register?coach_invite_token=' + encodeURIComponent(COACH_INVITE_TOKEN);
      fetch('/api/teams/validate/' + encodeURIComponent(COACH_INVITE_TOKEN))
        .then(r => r.json())
        .then(d => {
          if (d.success) {
            const banner = document.getElementById('inviteBanner');
            banner.innerHTML = 'You\'ve been invited to join <strong>' + d.data.name + '</strong>';
            banner.style.display = 'block';
          }
        })
        .catch(() => {});
    }

    async function handleLogin(e) {
      e.preventDefault();
      const btn = document.getElementById('loginBtn');
      btn.disabled = true;
      btn.innerHTML = '<span class="material-symbols-outlined">hourglass_empty</span> Signing in...';

      try {
        const res = await API.post('/api/auth/login', {
          email: document.getElementById('email').value,
          password: document.getElementById('password').value,
        });
        if (!res) throw new Error('שגיאה בהתחברות');
        API.setAuth(res.data.token, res.data.coach);
        if (res.data.language) localStorage.setItem('hoops_language', res.data.language);

        // Auto-join team if coming from invite link
        if (COACH_INVITE_TOKEN) {
          try {
            await API.post('/api/auth/join-team', { invite_token: COACH_INVITE_TOKEN });
          } catch (joinErr) {
            // Ignore "already a member" — still redirect to app
            console.warn('Join team:', joinErr.message);
          }
        }

        window.location.href = '/';
      } catch (err) {
        const errEl = document.getElementById('authError');
        errEl.innerHTML = '<span class="material-symbols-outlined">error</span>' + (err.message || 'שגיאה בהתחברות');
        errEl.style.display = 'flex';
      } finally {
        btn.disabled = false;
        btn.innerHTML = '<span class="material-symbols-outlined">login</span> Sign In';
      }
    }
  </script>
</body>
</html>
