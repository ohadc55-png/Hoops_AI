<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HOOPS AI - Platform Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/variables.css">
  <link rel="stylesheet" href="/static/css/reset.css">
  <link rel="stylesheet" href="/static/css/main.css">
  <style>
    .auth-page.sa-auth {
      --primary: #0891B2;
      --primary-light: #06B6D4;
      --primary-dark: #0E7490;
      --primary-glow: rgba(8, 145, 178, 0.2);
      --primary-ghost: rgba(8, 145, 178, 0.08);
      --bg: #1F2937;
      --bg-raised: #374151;
      --border: rgba(156, 163, 175, 0.15);
      --text: #FFFFFF;
      --text-secondary: #9CA3AF;
      --text-muted: #6B7280;
      --text-inverse: #FFFFFF;
    }
    .auth-page { min-height:100vh; display:flex; align-items:center; justify-content:center; background:var(--bg); padding:var(--sp-4); }
    .auth-card { width:100%; max-width:420px; background:var(--bg-raised); border:1px solid var(--border); border-radius:var(--r-2xl); padding:var(--sp-10); box-shadow: 0 0 40px rgba(8, 145, 178, 0.06); }
    .auth-logo { display:flex; align-items:center; gap:var(--sp-3); margin-bottom:var(--sp-8); justify-content:center; }
    .auth-logo-img { width:48px;height:48px;max-width:48px;max-height:48px;border-radius:var(--r-xl);object-fit:contain; }
    .auth-logo h1 { font-size:var(--text-2xl); font-weight:700; color:var(--text); }
    .auth-subtitle { text-align:center; color:var(--text-secondary); margin-bottom:var(--sp-6); font-size:var(--text-sm); }
    .auth-form { display:flex; flex-direction:column; gap:var(--sp-4); }
    .auth-footer { text-align:center; margin-top:var(--sp-6); font-size:var(--text-sm); color:var(--text-muted); }
    .auth-footer a { color:var(--primary-light); }
    .auth-error { background:rgba(220, 38, 38, 0.15); color:#DC2626; padding:var(--sp-3); border-radius:var(--r-lg); font-size:var(--text-sm); display:none; }
    .sa-badge { display:inline-block; font-size:10px; padding:2px 8px; background:var(--primary-ghost); color:var(--primary); border-radius:var(--r-full); font-weight:700; text-transform:uppercase; letter-spacing:0.05em; margin-left:var(--sp-2); }
  </style>
</head>
<body>
  <div class="auth-page sa-auth">
    <div class="auth-card">
      <div class="auth-logo">
        <img src="/static/images/logo.png" alt="HOOPS AI" class="auth-logo-img" width="48" height="48">
        <h1>HOOPS AI</h1>
        <span class="sa-badge">Platform</span>
      </div>
      <div class="auth-subtitle">Super Admin Login</div>

      <div class="auth-error" id="authError"></div>

      <form class="auth-form" id="loginForm" onsubmit="return handleSuperAdminLogin(event)">
        <div class="input-group">
          <label>Email</label>
          <input type="email" class="input" id="email" placeholder="admin@hoopsai.com" required>
        </div>
        <div class="input-group">
          <label>Password</label>
          <input type="password" class="input" id="password" placeholder="Enter your password" required>
        </div>
        <button type="submit" class="btn btn-primary btn-lg w-full" id="loginBtn">
          <span class="material-symbols-outlined">login</span>
          Sign In
        </button>
      </form>

      <div class="auth-footer">
        <a href="/admin/login" style="color:var(--text-muted);">Club Admin? Sign in here</a>
      </div>
    </div>
  </div>

  <div class="toast-container" id="toastContainer"></div>
  <script src="/static/js/super_admin_main.js"></script>
  <script>
    async function handleSuperAdminLogin(e) {
      e.preventDefault();
      const btn = document.getElementById('loginBtn');
      btn.disabled = true;
      btn.innerHTML = '<span class="material-symbols-outlined">hourglass_empty</span> Signing in...';

      try {
        const res = await SuperAdminAPI.post('/api/super-admin-auth/login', {
          email: document.getElementById('email').value,
          password: document.getElementById('password').value,
        });
        SuperAdminAPI.setAuth(res.data.token, res.data.user);
        window.location.href = '/super-admin';
      } catch (err) {
        const errEl = document.getElementById('authError');
        errEl.textContent = err.message || 'Invalid email or password';
        errEl.style.display = 'block';
      } finally {
        btn.disabled = false;
        btn.innerHTML = '<span class="material-symbols-outlined">login</span> Sign In';
      }
    }
  </script>
</body>
</html>
