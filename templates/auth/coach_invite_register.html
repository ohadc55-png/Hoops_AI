<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HOOPS AI - Coach Registration</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/variables.css">
  <link rel="stylesheet" href="/static/css/reset.css">
  <link rel="stylesheet" href="/static/css/main.css">
  <style>
    .auth-page { min-height:100vh; display:flex; align-items:center; justify-content:center; background:var(--bg); padding:var(--sp-4); }
    .auth-card { width:100%; max-width:480px; background:var(--bg-raised); border:1px solid var(--border); border-radius:var(--r-2xl); padding:var(--sp-8); }
    .auth-logo { display:flex; align-items:center; gap:var(--sp-3); margin-bottom:var(--sp-6); justify-content:center; }
    .auth-logo-img { width:48px;height:48px;max-width:48px;max-height:48px;border-radius:var(--r-xl);object-fit:contain; }
    .auth-logo h1 { font-size:var(--text-2xl); font-weight:700; }
    .auth-subtitle { text-align:center; color:var(--text-secondary); margin-bottom:var(--sp-6); font-size:var(--text-sm); }
    .auth-form { display:flex; flex-direction:column; gap:var(--sp-4); }
    .auth-footer { text-align:center; margin-top:var(--sp-6); font-size:var(--text-sm); color:var(--text-muted); }
    .auth-error { background:var(--error-bg); color:var(--error); padding:var(--sp-3); border-radius:var(--r-lg); font-size:var(--text-sm); display:none; }
    .team-info { background:rgba(244,140,37,0.12); border:1px solid var(--primary); color:var(--primary); padding:var(--sp-3) var(--sp-4); border-radius:var(--r-lg); font-size:var(--text-sm); display:none; text-align:center; font-weight:600; }
  </style>
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">
      <div class="auth-logo">
        <img src="/static/images/logo.png" alt="HOOPS AI" class="auth-logo-img" width="48" height="48">
        <h1>HOOPS AI</h1>
      </div>
      <div class="auth-subtitle">Coach Registration</div>

      <div class="team-info" id="teamInfo"></div>
      <div class="auth-error" id="authError"></div>

      <form class="auth-form" id="registerForm" onsubmit="return handleRegister(event)">
        <div class="input-group">
          <label>Full Name</label>
          <input type="text" class="input" id="name" placeholder="Coach Smith" required>
        </div>
        <div class="input-group">
          <label>Date of Birth</label>
          <input type="date" class="input" id="dateOfBirth">
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:var(--sp-3);">
          <div class="input-group">
            <label>Email</label>
            <input type="email" class="input" id="email" placeholder="coach@example.com" required>
          </div>
          <div class="input-group">
            <label>Phone</label>
            <input type="tel" class="input" id="phone" placeholder="050-1234567">
          </div>
        </div>
        <div class="input-group">
          <label>Password</label>
          <input type="password" class="input" id="password" placeholder="Min 6 characters" minlength="6" required>
        </div>
        <button type="submit" class="btn btn-primary btn-lg w-full" id="registerBtn">
          <span class="material-symbols-outlined">person_add</span>
          Create Account & Join Team
        </button>
      </form>

      <div class="auth-footer">
        Already have an account? <a href="/login" id="loginLink">Sign in</a>
      </div>
    </div>
  </div>

  <div class="toast-container" id="toastContainer"></div>
  <script src="/static/js/main.js"></script>
  <script>
    const INVITE_TOKEN = '{{ invite_token | default("") }}';

    // Show team name at top
    if (INVITE_TOKEN) {
      document.getElementById('loginLink').href = '/join/coach/' + encodeURIComponent(INVITE_TOKEN) + '/login';
      fetch('/api/teams/validate/' + encodeURIComponent(INVITE_TOKEN))
        .then(r => r.json())
        .then(d => {
          if (d.success) {
            const info = document.getElementById('teamInfo');
            info.textContent = 'Joining team: ' + d.data.name;
            info.style.display = 'block';
          }
        })
        .catch(() => {
          const err = document.getElementById('authError');
          err.textContent = 'Invalid or expired invite link';
          err.style.display = 'block';
        });
    }

    async function handleRegister(e) {
      e.preventDefault();
      const btn = document.getElementById('registerBtn');
      btn.disabled = true;
      try {
        const res = await API.post('/api/auth/register-with-invite', {
          name: document.getElementById('name').value,
          email: document.getElementById('email').value,
          password: document.getElementById('password').value,
          phone: document.getElementById('phone').value.trim() || null,
          date_of_birth: document.getElementById('dateOfBirth').value || null,
          invite_link_token: INVITE_TOKEN || null,
        });
        if (!res) throw new Error('Registration failed. Please try again.');
        API.setAuth(res.data.token, res.data.coach);
        window.location.href = '/';
      } catch (err) {
        const errEl = document.getElementById('authError');
        errEl.textContent = err.message;
        errEl.style.display = 'block';
      } finally {
        btn.disabled = false;
      }
    }
  </script>
</body>
</html>
