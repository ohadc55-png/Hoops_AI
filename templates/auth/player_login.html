<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HOOPS AI - Player Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/variables.css">
  <link rel="stylesheet" href="/static/css/reset.css">
  <link rel="stylesheet" href="/static/css/main.css">
  <style>
    .auth-page.player-auth {
      --primary: #22c55e; --primary-light: #4ade80; --primary-dark: #16a34a;
      --primary-glow: rgba(34,197,94,0.25); --primary-ghost: rgba(34,197,94,0.1);
      --bg: #050808; --bg-raised: #0a120e;
      --border: rgba(34,197,94,0.1);
      --text: #f0fdf4; --text-secondary: #bbf7d0; --text-muted: rgba(74,222,128,0.5); --text-inverse: #050808;
    }
    .auth-page { min-height:100vh; display:flex; align-items:center; justify-content:center; background:var(--bg); padding:var(--sp-4); }
    .auth-card { width:100%; max-width:420px; background:var(--bg-raised); border:1px solid rgba(34,197,94,0.15); border-radius:var(--r-2xl); padding:var(--sp-10); box-shadow: 0 0 40px rgba(34,197,94,0.08); position:relative; overflow:hidden; }
    .auth-card::before { content:''; position:absolute; top:0; left:0; right:0; height:1px; background:linear-gradient(90deg, transparent, #22c55e, transparent); opacity:0.6; }
    .auth-logo { display:flex; align-items:center; gap:var(--sp-3); margin-bottom:var(--sp-8); justify-content:center; }
    .auth-logo-img { width:48px;height:48px;max-width:48px;max-height:48px;border-radius:var(--r-xl);object-fit:contain; }
    .auth-logo h1 { font-size:var(--text-2xl); font-weight:700; color:var(--text); text-shadow: 0 0 10px rgba(34,197,94,0.2); }
    .auth-subtitle { text-align:center; color:var(--text-secondary); margin-bottom:var(--sp-6); font-size:var(--text-sm); }
    .auth-form { display:flex; flex-direction:column; gap:var(--sp-4); }
    .auth-footer { text-align:center; margin-top:var(--sp-6); font-size:var(--text-sm); color:var(--text-muted); }
    .auth-footer a { color:var(--primary-light); }
    .auth-error { background:rgba(239,68,68,0.1); color:#ef4444; padding:var(--sp-3) var(--sp-4); border-radius:var(--r-lg); border-right:4px solid #ef4444; font-size:var(--text-sm); font-weight:500; display:none; align-items:center; gap:var(--sp-2); direction:rtl; text-align:right; margin-bottom:var(--sp-2); animation:authErrorIn 0.3s ease; }
    .auth-error .material-symbols-outlined { font-size:20px; flex-shrink:0; }
    @keyframes authErrorIn { from { opacity:0; transform:translateY(-6px); } to { opacity:1; transform:translateY(0); } }
  </style>
</head>
<body>
  <div class="auth-page player-auth">
    <div class="auth-card">
      <div class="auth-logo">
        <img src="/static/images/logo.png" alt="HOOPS AI" class="auth-logo-img" width="48" height="48">
        <h1>HOOPS AI</h1>
      </div>
      <div class="auth-subtitle">Player Login</div>

      <div class="auth-error" id="authError"></div>

      <form class="auth-form" id="loginForm" onsubmit="return handlePlayerLogin(event)">
        <div class="input-group">
          <label>Email</label>
          <input type="email" class="input" id="email" placeholder="player@example.com" required>
        </div>
        <div class="input-group">
          <label>Password</label>
          <input type="password" class="input" id="password" placeholder="Enter your password" required>
        </div>
        <button type="submit" class="btn btn-primary btn-lg w-full" id="loginBtn">
          <span class="material-symbols-outlined">login</span>
          Sign In
        </button>
      </form>

      <div class="auth-footer">
        Don't have an account? <a href="/player/register">Register with invite code</a>
        <br><br>
        <a href="/login" style="color:var(--text-muted);">Coach? Sign in here</a>
      </div>
    </div>
  </div>

  <div class="toast-container" id="toastContainer"></div>
  <script src="/static/js/shared-utils.js"></script>
  <script src="/static/js/api-core.js"></script>
  <script src="/static/js/player_main.js"></script>
  <script>
    async function handlePlayerLogin(e) {
      e.preventDefault();
      const btn = document.getElementById('loginBtn');
      btn.disabled = true;
      btn.innerHTML = '<span class="material-symbols-outlined">hourglass_empty</span> Signing in...';

      try {
        const res = await PlayerAPI.post('/api/player-auth/login', {
          email: document.getElementById('email').value,
          password: document.getElementById('password').value,
        });
        PlayerAPI.setAuth(res.data.token, res.data.user);
        if (res.data.language) localStorage.setItem('hoops_language', res.data.language);
        window.location.href = '/player';
      } catch (err) {
        const errEl = document.getElementById('authError');
        errEl.innerHTML = '<span class="material-symbols-outlined">error</span>' + (err.message || 'שגיאה בהתחברות');
        errEl.style.display = 'flex';
      } finally {
        btn.disabled = false;
        btn.innerHTML = '<span class="material-symbols-outlined">login</span> Sign In';
      }
    }
  </script>
</body>
</html>
