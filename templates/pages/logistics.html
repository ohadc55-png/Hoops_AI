{% extends "base.html" %}
{% block title %}HOOPS AI - Team Management{% endblock %}
{% block nav_logistics %}active{% endblock %}
{% block content %}
<div class="page-header">
  <div>
    <h1 class="page-title" data-i18n="coach.nav.logistics">Team Management</h1>
    <p class="page-subtitle" data-i18n="coach.logistics.subtitle">Roster management</p>
  </div>
</div>
<div id="tab-players"></div>

<!-- Player Modal -->
<div class="modal-overlay" id="playerModal">
  <div class="modal">
    <div class="modal-header">
      <h2 class="modal-title" id="playerModalTitle" data-i18n="coach.logistics.modal.add_player">Add Player</h2>
      <button class="modal-close" onclick="closeModal('playerModal')"><span class="material-symbols-outlined">close</span></button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="plId">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:var(--sp-3);">
        <div class="input-group"><label data-i18n="coach.logistics.field.name">Name</label><input type="text" class="input" id="plName" data-i18n-placeholder="coach.logistics.field.name_placeholder" placeholder="Player name"></div>
        <div class="input-group"><label data-i18n="coach.logistics.field.jersey">Jersey #</label><input type="number" class="input" id="plJersey" placeholder="0" min="0" max="99"></div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:var(--sp-3);">
        <div class="input-group"><label data-i18n="coach.logistics.field.position">Position</label>
          <select class="select" id="plPosition">
            <option value="" data-i18n="coach.logistics.field.select">Select...</option>
            <option value="PG" data-i18n="coach.logistics.position.pg">Point Guard (PG)</option>
            <option value="SG" data-i18n="coach.logistics.position.sg">Shooting Guard (SG)</option>
            <option value="SF" data-i18n="coach.logistics.position.sf">Small Forward (SF)</option>
            <option value="PF" data-i18n="coach.logistics.position.pf">Power Forward (PF)</option>
            <option value="C" data-i18n="coach.logistics.position.c">Center (C)</option>
          </select>
        </div>
        <div class="input-group"><label data-i18n="coach.logistics.field.gender">Gender</label>
          <select class="select" id="plGender">
            <option value="" data-i18n="coach.logistics.field.select">Select...</option>
            <option value="male" data-i18n="coach.logistics.gender.male">Male</option>
            <option value="female" data-i18n="coach.logistics.gender.female">Female</option>
          </select>
        </div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:var(--sp-3);">
        <div class="input-group"><label data-i18n="coach.logistics.field.birth_date">Birth Date</label><input type="date" class="input" id="plBirthDate"></div>
        <div class="input-group"><label data-i18n="coach.logistics.field.height">Height (cm)</label><input type="number" class="input" id="plHeight" placeholder="170" min="100" max="250"></div>
        <div class="input-group"><label data-i18n="coach.logistics.field.weight">Weight (kg)</label><input type="number" class="input" id="plWeight" placeholder="70" min="20" max="200" step="0.1"></div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:var(--sp-3);">
        <div class="input-group"><label data-i18n="coach.logistics.field.player_phone">Player Phone</label><input type="tel" class="input" id="plPlayerPhone" data-i18n-placeholder="coach.logistics.field.player_phone_placeholder" placeholder="Player phone"></div>
        <div class="input-group"><label data-i18n="coach.logistics.field.player_email">Player Email</label><input type="email" class="input" id="plPlayerEmail" data-i18n-placeholder="coach.logistics.field.player_email_placeholder" placeholder="Player email"></div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:var(--sp-3);">
        <div class="input-group"><label data-i18n="coach.logistics.field.parent_phone">Parent Phone</label><input type="tel" class="input" id="plPhone" data-i18n-placeholder="coach.logistics.field.parent_phone_placeholder" placeholder="Parent phone"></div>
        <div class="input-group"><label data-i18n="coach.logistics.field.parent_email">Parent Email</label><input type="email" class="input" id="plEmail" data-i18n-placeholder="coach.logistics.field.parent_email_placeholder" placeholder="Parent email"></div>
      </div>
      <div class="input-group"><label data-i18n="coach.logistics.field.notes">Notes</label><textarea class="textarea" id="plNotes" data-i18n-placeholder="coach.logistics.field.notes_placeholder" placeholder="Additional notes" rows="2"></textarea></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal('playerModal')" data-i18n="btn.cancel">Cancel</button>
      <button class="btn btn-primary" onclick="savePlayer()" data-i18n="coach.logistics.btn.save_player">Save Player</button>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

document.addEventListener('DOMContentLoaded', () => { loadPlayers(); });

// ===== PLAYERS =====
let _players = [];
function calcAge(bd) {
  if (!bd) return '';
  const d = new Date(bd), now = new Date();
  let age = now.getFullYear() - d.getFullYear();
  if (now.getMonth() < d.getMonth() || (now.getMonth() === d.getMonth() && now.getDate() < d.getDate())) age--;
  return age;
}

async function loadPlayers() {
  try {
    const r = await API.get('/api/players');
    _players = r.data;
    const el = document.getElementById('tab-players');
    const th = s => `<th style="padding:var(--sp-2);text-align:left;color:var(--text-muted);">${s}</th>`;
    el.innerHTML = `<button class="btn btn-primary" style="margin-bottom:var(--sp-4);" onclick="openPlayerModal()"><span class="material-symbols-outlined">add</span> ${t('coach.logistics.btn.add_player')}</button>`
      + (r.data.length ? '<div style="overflow-x:auto;"><table style="width:100%;font-size:var(--text-sm);"><thead><tr style="border-bottom:1px solid var(--border);">'
      + th(t('coach.logistics.table.number')) + th(t('coach.logistics.table.name')) + th(t('coach.logistics.table.pos')) + th(t('coach.logistics.table.age')) + th(t('coach.logistics.table.height')) + th(t('coach.logistics.table.weight')) + th(t('coach.logistics.table.phone')) + th(t('coach.logistics.table.actions'))
      + '</tr></thead><tbody>'
      + r.data.map(p => {
        const age = calcAge(p.birth_date);
        return `<tr style="border-bottom:1px solid var(--border);">
        <td style="padding:var(--sp-2);">${p.jersey_number||'-'}</td>
        <td style="padding:var(--sp-2);"><a href="/players/${p.id}" class="player-name-link">${esc(p.name)}</a></td>
        <td style="padding:var(--sp-2);">${p.position||'-'}</td>
        <td style="padding:var(--sp-2);">${age!==''?age:'-'}</td>
        <td style="padding:var(--sp-2);">${p.height?p.height+'cm':'-'}</td>
        <td style="padding:var(--sp-2);">${p.weight?p.weight+'kg':'-'}</td>
        <td style="padding:var(--sp-2);">${p.parent_phone||p.phone||'-'}</td>
        <td style="padding:var(--sp-2);">
          <button class="btn-icon" style="width:24px;height:24px;" onclick="editPlayer(${p.id})"><span class="material-symbols-outlined" style="font-size:14px;">edit</span></button>
          <button class="btn-icon" style="width:24px;height:24px;" onclick="deletePlayer(${p.id})"><span class="material-symbols-outlined" style="font-size:14px;">delete</span></button>
        </td>
      </tr>`;}).join('')
      + `</tbody></table></div>` : `<div class="empty-state"><span class="material-symbols-outlined">groups</span><h3>${t('coach.logistics.empty.title')}</h3><p>${t('coach.logistics.empty.subtitle')}</p></div>`);
  } catch(e){}
}

function openPlayerModal(data) {
  document.getElementById('plId').value = data?.id || '';
  document.getElementById('plName').value = data?.name || '';
  document.getElementById('plJersey').value = data?.jersey_number || '';
  document.getElementById('plPosition').value = data?.position || '';
  document.getElementById('plGender').value = data?.gender || '';
  document.getElementById('plBirthDate').value = data?.birth_date || '';
  document.getElementById('plHeight').value = data?.height || '';
  document.getElementById('plWeight').value = data?.weight || '';
  document.getElementById('plPlayerPhone').value = data?.phone || '';
  document.getElementById('plPlayerEmail').value = data?.email || '';
  document.getElementById('plPhone').value = data?.parent_phone || '';
  document.getElementById('plEmail').value = data?.parent_email || '';
  document.getElementById('plNotes').value = data?.notes || '';
  document.getElementById('playerModalTitle').textContent = data ? t('coach.logistics.modal.edit_player') : t('coach.logistics.modal.add_player');
  openModal('playerModal');
}

function editPlayer(id) {
  const p = _players.find(x => x.id === id);
  if (p) openPlayerModal(p);
}

async function savePlayer() {
  const id = document.getElementById('plId').value;
  const body = {
    name: document.getElementById('plName').value,
    jersey_number: document.getElementById('plJersey').value ? parseInt(document.getElementById('plJersey').value) : null,
    position: document.getElementById('plPosition').value || null,
    gender: document.getElementById('plGender').value || null,
    birth_date: document.getElementById('plBirthDate').value || null,
    height: document.getElementById('plHeight').value ? parseInt(document.getElementById('plHeight').value) : null,
    weight: document.getElementById('plWeight').value ? parseFloat(document.getElementById('plWeight').value) : null,
    phone: document.getElementById('plPlayerPhone').value || null,
    email: document.getElementById('plPlayerEmail').value || null,
    parent_phone: document.getElementById('plPhone').value || null,
    parent_email: document.getElementById('plEmail').value || null,
    notes: document.getElementById('plNotes').value || null,
  };
  if (!body.name) { Toast.error(t('coach.logistics.error.name_required')); return; }
  try {
    if (id) await API.put(`/api/players/${id}`, body);
    else await API.post('/api/players', body);
    closeModal('playerModal');
    Toast.success(id ? t('coach.logistics.player_updated') : t('coach.logistics.player_added'));
    loadPlayers();
  } catch(e){}
}

async function deletePlayer(id) {
  if (!confirm(t('coach.logistics.confirm_delete_player'))) return;
  try { await API.del(`/api/players/${id}`); Toast.success(t('coach.logistics.player_deleted')); loadPlayers(); } catch(e){}
}
</script>
{% endblock %}
