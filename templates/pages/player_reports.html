{% extends "player_base.html" %}
{% block title %}HOOPS AI — My Reports{% endblock %}
{% block nav_reports %}active{% endblock %}
{% block header_title %}<span data-i18n="player.reports.page_title">My Reports</span>{% endblock %}
{% block content %}
<div class="player-dashboard">
  <section class="dashboard-section">
    <div class="section-header">
      <h2><span class="material-symbols-outlined">assessment</span> <span data-i18n="player.reports.page_title">My Reports</span></h2>
    </div>
    <div class="section-content" id="reportsContent">
      <div class="loading-state" data-i18n="player.reports.loading">Loading reports...</div>
    </div>
  </section>
</div>
{% endblock %}

{% block scripts %}
<script>
document.addEventListener('DOMContentLoaded', () => {
  if (!PlayerAPI.token) return;
  loadReports();
});

async function loadReports() {
  const el = document.getElementById('reportsContent');
  try {
    const res = await PlayerAPI.get('/api/player/reports');
    const reports = res.data || [];
    if (reports.length === 0) {
      el.innerHTML = `<div class="empty-state-player"><span class="material-symbols-outlined">assessment</span>${I18N.t('player.reports.no_reports')}</div>`;
      return;
    }
    el.innerHTML = reports.map(r => {
      const strengths = Array.isArray(r.strengths) ? r.strengths.join(', ') : (r.strengths || '');
      const weaknesses = Array.isArray(r.weaknesses) ? r.weaknesses.join(', ') : (r.weaknesses || '');
      const focus = Array.isArray(r.focus_areas) ? r.focus_areas.join(', ') : (r.focus_areas || '');
      return `<div class="report-card">
        <div class="report-period">${esc(r.period)}${r.is_ai_generated ? ' <span class="badge badge-neutral" style="font-size:10px;">AI</span>' : ''}</div>
        ${strengths ? `<div class="report-field"><div class="report-field-label">${I18N.t('player.reports.strengths')}</div><div class="report-field-value">${esc(strengths)}</div></div>` : ''}
        ${weaknesses ? `<div class="report-field"><div class="report-field-label">${I18N.t('player.reports.areas_to_improve')}</div><div class="report-field-value">${esc(weaknesses)}</div></div>` : ''}
        ${focus ? `<div class="report-field"><div class="report-field-label">${I18N.t('player.reports.focus_areas')}</div><div class="report-field-value">${esc(focus)}</div></div>` : ''}
        ${r.recommendations ? `<div class="report-field"><div class="report-field-label">${I18N.t('player.reports.recommendations')}</div><div class="report-field-value">${esc(r.recommendations)}</div></div>` : ''}
      </div>`;
    }).join('');
  } catch {
    el.innerHTML = `<div class="empty-state-player">${I18N.t('player.reports.load_error')}</div>`;
  }
}
</script>
{% endblock %}
