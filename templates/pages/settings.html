{% extends "base.html" %}
{% block title %}HOOPS AI - Settings{% endblock %}
{% block nav_settings %}active{% endblock %}
{% block content %}
<div class="page-header"><div><h1 class="page-title" data-i18n="coach.nav.settings">הגדרות</h1><p class="page-subtitle" data-i18n="settings.subtitle">התאם אישית את החוויה שלך</p></div></div>
<div style="max-width:600px;">
  <div class="card" style="margin-bottom:var(--sp-4);">
    <h3 style="font-weight:700;margin-bottom:var(--sp-4);" data-i18n="settings.profile">פרופיל</h3>
    <div class="flex flex-col gap-4" id="profileForm">
      <div class="input-group"><label data-i18n="settings.name">שם</label><input type="text" class="input" id="settName"></div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:var(--sp-3);">
        <div class="input-group"><label data-i18n="settings.age_group">קבוצת גיל</label>
          <select class="select" id="settAge">
            <option value="" data-i18n="settings.select">בחר...</option>
            <option value="u8">U8</option><option value="u10">U10</option><option value="u12">U12</option>
            <option value="u14">U14</option><option value="u16">U16</option><option value="u18">U18</option>
            <option value="adult" data-i18n="settings.adult">מבוגרים</option><option value="senior" data-i18n="settings.senior">בוגר</option>
          </select>
        </div>
        <div class="input-group"><label data-i18n="settings.level">רמה</label>
          <select class="select" id="settLevel">
            <option value="" data-i18n="settings.select">בחר...</option>
            <option value="youth" data-i18n="settings.level_youth">נוער</option><option value="middle_school" data-i18n="settings.level_middle">חטיבת ביניים</option>
            <option value="high_school" data-i18n="settings.level_high">תיכון</option><option value="college" data-i18n="settings.level_college">מכללה</option>
            <option value="semi_pro" data-i18n="settings.level_semi_pro">חצי מקצועי</option><option value="professional" data-i18n="settings.level_pro">מקצועי</option>
          </select>
        </div>
      </div>
      <button class="btn btn-primary" onclick="saveProfile()" data-i18n="settings.save">שמור שינויים</button>
    </div>
  </div>
  <div class="card">
    <h3 style="font-weight:700;margin-bottom:var(--sp-4);color:var(--error);" data-i18n="settings.danger_zone">אזור מסוכן</h3>
    <button class="btn btn-danger" onclick="if(confirm(t('settings.confirm_logout'))){API.clearAuth();location.href='/login';}">
      <span class="material-symbols-outlined">logout</span> <span data-i18n="settings.logout">התנתק</span>
    </button>
  </div>
</div>
{% endblock %}
{% block scripts %}
<script>
document.addEventListener('DOMContentLoaded', async () => {
  try {
    const r = await API.get('/api/auth/me');
    const c = r.data;
    document.getElementById('settName').value = c.name || '';
    document.getElementById('settAge').value = c.age_group || '';
    document.getElementById('settLevel').value = c.level || '';
  } catch(e) {
    if (API.coach) {
      document.getElementById('settName').value = API.coach.name || '';
      document.getElementById('settAge').value = API.coach.age_group || '';
      document.getElementById('settLevel').value = API.coach.level || '';
    }
  }
});
async function saveProfile() {
  try {
    const r = await API.put('/api/auth/me', {
      name: document.getElementById('settName').value,
      age_group: document.getElementById('settAge').value || null,
      level: document.getElementById('settLevel').value || null,
    });
    API.coach = { ...API.coach, ...r.data };
    localStorage.setItem('hoops_coach', JSON.stringify(API.coach));
    Toast.success(t('settings.profile_updated'));
  } catch(e) {}
}
</script>
{% endblock %}
