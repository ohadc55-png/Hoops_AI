{% extends "base.html" %}
{% block title %}HOOPS AI - Settings{% endblock %}
{% block nav_settings %}active{% endblock %}
{% block content %}
<div class="page-header"><div><h1 class="page-title">Settings</h1><p class="page-subtitle">Customize your experience</p></div></div>
<div style="max-width:600px;">
  <div class="card" style="margin-bottom:var(--sp-4);">
    <h3 style="font-weight:700;margin-bottom:var(--sp-4);">Profile</h3>
    <div class="flex flex-col gap-4" id="profileForm">
      <div class="input-group"><label>Name</label><input type="text" class="input" id="settName"></div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:var(--sp-3);">
        <div class="input-group"><label>Age Group</label>
          <select class="select" id="settAge">
            <option value="">Select...</option>
            <option value="u8">U8</option><option value="u10">U10</option><option value="u12">U12</option>
            <option value="u14">U14</option><option value="u16">U16</option><option value="u18">U18</option>
            <option value="adult">Adult</option><option value="senior">Senior</option>
          </select>
        </div>
        <div class="input-group"><label>Level</label>
          <select class="select" id="settLevel">
            <option value="">Select...</option>
            <option value="youth">Youth</option><option value="middle_school">Middle School</option>
            <option value="high_school">High School</option><option value="college">College</option>
            <option value="semi_pro">Semi Pro</option><option value="professional">Professional</option>
          </select>
        </div>
      </div>
      <button class="btn btn-primary" onclick="saveProfile()">Save Changes</button>
    </div>
  </div>
  <div class="card">
    <h3 style="font-weight:700;margin-bottom:var(--sp-4);color:var(--error);">Danger Zone</h3>
    <button class="btn btn-danger" onclick="if(confirm('Log out?')){API.clearAuth();location.href='/login';}">
      <span class="material-symbols-outlined">logout</span> Log Out
    </button>
  </div>
</div>
{% endblock %}
{% block scripts %}
<script>
document.addEventListener('DOMContentLoaded', async () => {
  try {
    const r = await API.get('/api/auth/me');
    const c = r.data;
    document.getElementById('settName').value = c.name || '';
    document.getElementById('settAge').value = c.age_group || '';
    document.getElementById('settLevel').value = c.level || '';
  } catch(e) {
    if (API.coach) {
      document.getElementById('settName').value = API.coach.name || '';
      document.getElementById('settAge').value = API.coach.age_group || '';
      document.getElementById('settLevel').value = API.coach.level || '';
    }
  }
});
async function saveProfile() {
  try {
    const r = await API.put('/api/auth/me', {
      name: document.getElementById('settName').value,
      age_group: document.getElementById('settAge').value || null,
      level: document.getElementById('settLevel').value || null,
    });
    API.coach = { ...API.coach, ...r.data };
    localStorage.setItem('hoops_coach', JSON.stringify(API.coach));
    Toast.success('Profile updated!');
  } catch(e) {}
}
</script>
{% endblock %}
