<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HOOPS AI — קבלה</title>
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Heebo', sans-serif;
      background: #f1f5f9;
      color: #1e293b;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 32px 16px;
    }
    .receipt-page {
      background: #fff;
      max-width: 600px;
      width: 100%;
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      padding: 48px 40px;
      height: fit-content;
    }

    /* Header */
    .receipt-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 32px;
      padding-bottom: 24px;
      border-bottom: 2px solid #e2e8f0;
    }
    .receipt-logo {
      font-size: 28px;
      font-weight: 700;
      color: #3b82f6;
    }
    .receipt-logo span {
      color: #f48c25;
    }
    .receipt-title-block {
      text-align: left;
    }
    .receipt-title {
      font-size: 22px;
      font-weight: 600;
      color: #1e293b;
    }
    .receipt-number {
      font-size: 14px;
      color: #64748b;
      margin-top: 4px;
    }

    /* Details grid */
    .receipt-details {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 32px;
    }
    .detail-item label {
      display: block;
      font-size: 12px;
      color: #94a3b8;
      font-weight: 500;
      margin-bottom: 4px;
    }
    .detail-item .value {
      font-size: 15px;
      font-weight: 500;
      color: #1e293b;
    }

    /* Amount box */
    .receipt-amount-box {
      background: #f0f9ff;
      border: 1px solid #bae6fd;
      border-radius: 10px;
      padding: 24px;
      text-align: center;
      margin-bottom: 32px;
    }
    .receipt-amount-label {
      font-size: 14px;
      color: #64748b;
      margin-bottom: 8px;
    }
    .receipt-amount-value {
      font-size: 36px;
      font-weight: 700;
      color: #0369a1;
      direction: ltr;
      unicode-bidi: bidi-override;
    }

    /* Footer */
    .receipt-footer {
      border-top: 1px solid #e2e8f0;
      padding-top: 20px;
      text-align: center;
      color: #94a3b8;
      font-size: 13px;
    }
    .receipt-footer .club-name {
      font-weight: 600;
      color: #64748b;
    }

    /* Actions */
    .receipt-actions {
      display: flex;
      gap: 12px;
      justify-content: center;
      margin-top: 24px;
    }
    .receipt-actions button {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 10px 20px;
      border-radius: 8px;
      border: none;
      font-family: 'Heebo', sans-serif;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
    }
    .btn-print {
      background: #3b82f6;
      color: #fff;
    }
    .btn-back {
      background: #e2e8f0;
      color: #475569;
    }

    /* Loading */
    .receipt-loading {
      text-align: center;
      padding: 60px 0;
      color: #94a3b8;
      font-size: 16px;
    }

    /* Print styles */
    @media print {
      body { background: #fff; padding: 0; }
      .receipt-page { box-shadow: none; border-radius: 0; padding: 24px; }
      .receipt-actions { display: none; }
    }
  </style>
</head>
<body>
  <div class="receipt-page" id="receiptPage">
    <div class="receipt-loading" id="receiptLoading">טוען קבלה...</div>
  </div>

  <script>
    const RECEIPT_TYPE = '{{ receipt_type }}';
    const ITEM_ID = {{ item_id }};

    document.addEventListener('DOMContentLoaded', loadReceipt);

    async function loadReceipt() {
      const token = localStorage.getItem('hoops_parent_token');
      if (!token) {
        window.location.href = '/parent/login';
        return;
      }

      try {
        const res = await fetch(`/api/billing/my/receipt/${RECEIPT_TYPE}/${ITEM_ID}`, {
          headers: { 'Authorization': `Bearer ${token}` },
        });
        const json = await res.json();
        if (!res.ok || !json.success) throw new Error(json.detail || 'Error');
        renderReceipt(json.data);
      } catch (err) {
        document.getElementById('receiptLoading').textContent = 'לא ניתן לטעון את הקבלה';
      }
    }

    function renderReceipt(d) {
      const amount = '₪' + Number(d.amount).toLocaleString('he-IL', { minimumFractionDigits: 0 });

      // Club details lines
      let clubDetails = '';
      if (d.club_tax_id) clubDetails += `<div>ח.פ / ע.מ: ${d.club_tax_id}</div>`;
      if (d.club_address) clubDetails += `<div>${d.club_address}</div>`;
      if (d.club_phone) clubDetails += `<div>${d.club_phone}</div>`;
      if (d.club_email) clubDetails += `<div>${d.club_email}</div>`;

      document.getElementById('receiptPage').innerHTML = `
        <div class="receipt-header">
          <div>
            <div class="receipt-logo">${d.club_name || 'HOOPS AI'}</div>
            <div style="font-size:13px;color:#64748b;margin-top:4px;line-height:1.6;">
              ${clubDetails}
            </div>
          </div>
          <div class="receipt-title-block">
            <div class="receipt-title">קבלה</div>
            <div class="receipt-number">${d.receipt_number}</div>
          </div>
        </div>

        <div class="receipt-details">
          <div class="detail-item">
            <label>תאריך</label>
            <div class="value">${d.date}</div>
          </div>
          <div class="detail-item">
            <label>שם ההורה</label>
            <div class="value">${d.parent_name}</div>
          </div>
          <div class="detail-item">
            <label>שחקן/ית</label>
            <div class="value">${d.player_name}</div>
          </div>
          <div class="detail-item">
            <label>קבוצה</label>
            <div class="value">${d.team_name}</div>
          </div>
          <div class="detail-item">
            <label>תיאור</label>
            <div class="value">${d.description}</div>
          </div>
          <div class="detail-item">
            <label>אמצעי תשלום</label>
            <div class="value">${d.payment_method}</div>
          </div>
        </div>

        <div class="receipt-amount-box">
          <div class="receipt-amount-label">סכום ששולם</div>
          <div class="receipt-amount-value">${amount}</div>
        </div>

        <div class="receipt-footer">
          <div class="club-name">${d.club_name}</div>
          <div style="margin-top:6px;">מסמך זה מהווה אישור תשלום בלבד</div>
        </div>

        <div class="receipt-actions">
          <button class="btn-print" onclick="window.print()">
            <span class="material-symbols-outlined" style="font-size:18px;">print</span>
            הדפס / שמור PDF
          </button>
          <button class="btn-back" onclick="window.location.href='/parent/payments'">
            <span class="material-symbols-outlined" style="font-size:18px;">arrow_forward</span>
            חזרה לתשלומים
          </button>
        </div>
      `;
    }
  </script>
</body>
</html>
