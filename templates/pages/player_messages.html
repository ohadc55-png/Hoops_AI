{% extends "player_base.html" %}
{% block title %}HOOPS AI — Messages{% endblock %}
{% block nav_messages %}active{% endblock %}
{% block header_title %}<span data-i18n="player.nav.messages">Messages</span>{% endblock %}
{% block content %}
<div class="player-messages-page">

  <div class="msg-tabs">
    <div class="msg-tab active" onclick="switchPlayerMsgTab('inbox')" data-i18n="player.messages.tab_inbox">Inbox</div>
    <div class="msg-tab" onclick="switchPlayerMsgTab('compose')" data-i18n="player.messages.tab_compose">Compose</div>
  </div>

  <!-- Player Inbox -->
  <div class="msg-tab-content" id="playerMsgInbox">
    <div class="msg-list" id="playerInboxList">
      <div class="loading-state" data-i18n="player.messages.loading">Loading messages...</div>
    </div>
  </div>

  <!-- Player Compose -->
  <div class="msg-tab-content" id="playerMsgCompose" style="display:none;">
    <div class="compose-form">
      <div class="form-group">
        <label data-i18n="player.messages.send_to">Send to</label>
        <select class="input" id="playerComposeTarget">
          <option value="my_coach" data-i18n="player.messages.target_my_coach">My Coach</option>
          <option value="my_team" data-i18n="player.messages.target_my_team">My Team</option>
        </select>
      </div>
      <div class="form-group">
        <label data-i18n="player.messages.subject_label">Subject (optional)</label>
        <input type="text" class="input" id="playerComposeSubject" data-i18n-placeholder="player.messages.subject_placeholder" placeholder="Subject...">
      </div>
      <div class="form-group">
        <label data-i18n="player.messages.message_label">Message</label>
        <textarea class="input" id="playerComposeBody" rows="4" data-i18n-placeholder="player.messages.message_placeholder" placeholder="Write your message..."></textarea>
      </div>
      <button class="btn btn-primary" onclick="sendPlayerMsg()">
        <span class="material-symbols-outlined">send</span> <span data-i18n="btn.send">Send</span>
      </button>
    </div>
  </div>

  <!-- Player Message Detail Modal -->
  <div class="modal-overlay" id="playerMsgDetailModal">
    <div class="modal">
      <div class="modal-header">
        <h3 id="playerMsgDetailSubject">Message</h3>
        <button class="btn-icon" onclick="closePlayerMsgModal()">
          <span class="material-symbols-outlined">close</span>
        </button>
      </div>
      <div class="modal-body">
        <div class="msg-detail-meta" id="playerMsgDetailMeta"></div>
        <div class="msg-detail-body" id="playerMsgDetailBody" style="margin-top:12px;white-space:pre-wrap;"></div>
      </div>
    </div>
  </div>

</div>
{% endblock %}

{% block scripts %}
<script src="/static/js/player_messages.js"></script>
{% endblock %}
