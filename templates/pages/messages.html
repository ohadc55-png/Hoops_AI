{% extends "base.html" %}
{% block title %}HOOPS AI — Messages{% endblock %}
{% block nav_messages %}active{% endblock %}
{% block content %}
<div class="coach-messages">
  <!-- Sub-tabs -->
  <div class="msg-tabs">
    <div class="msg-tab active" onclick="switchCoachMsgTab('inbox')">Inbox</div>
    <div class="msg-tab" onclick="switchCoachMsgTab('sent')">Sent</div>
    <div class="msg-tab" onclick="switchCoachMsgTab('compose')">Compose</div>
  </div>

  <!-- Inbox -->
  <div class="msg-tab-content" id="coachMsgInbox">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
      <h3 style="font-size:16px;font-weight:600;">Inbox</h3>
      <button class="btn btn-secondary btn-sm" onclick="coachMarkAllRead()">Mark All Read</button>
    </div>
    <div class="msg-list" id="coachInboxList">
      <div class="loading-state">Loading messages...</div>
    </div>
  </div>

  <!-- Sent -->
  <div class="msg-tab-content" id="coachMsgSent" style="display:none;">
    <h3 style="font-size:16px;font-weight:600;margin-bottom:12px;">Sent Messages</h3>
    <div class="msg-list" id="coachSentList">
      <div class="loading-state">Loading...</div>
    </div>
  </div>

  <!-- Compose -->
  <div class="msg-tab-content" id="coachMsgCompose" style="display:none;">
    <h3 style="font-size:16px;font-weight:600;margin-bottom:12px;">Compose Message</h3>
    <div class="compose-form">
      <div class="form-group">
        <label>Send to</label>
        <select class="input" id="coachComposeTarget">
          <option value="admin">Management</option>
          <option value="my_team_players">Team Players</option>
          <option value="my_team_parents">Team Parents</option>
          <option value="my_team">Entire Team</option>
        </select>
      </div>

      <div class="form-group">
        <label>Subject (optional)</label>
        <input type="text" class="input" id="coachComposeSubject" placeholder="Subject...">
      </div>

      <div class="form-group">
        <label>Message</label>
        <textarea class="input" id="coachComposeBody" rows="5" placeholder="Write your message..."></textarea>
      </div>

      <button class="btn btn-primary" onclick="sendCoachMessage()">
        <span class="material-symbols-outlined">send</span> Send
      </button>
    </div>
  </div>
</div>

<!-- Message Detail Modal -->
<div class="modal-overlay" id="coachMsgDetailModal">
  <div class="modal">
    <div class="modal-header">
      <h3 id="coachMsgDetailSubject">Message</h3>
      <button class="btn-icon" onclick="closeModal('coachMsgDetailModal')">
        <span class="material-symbols-outlined">close</span>
      </button>
    </div>
    <div class="modal-body">
      <div class="msg-detail-meta" id="coachMsgDetailMeta"></div>
      <div class="msg-detail-body" id="coachMsgDetailBody" style="margin-top:12px;white-space:pre-wrap;"></div>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script src="/static/js/messages.js"></script>
{% endblock %}
