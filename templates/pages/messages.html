{% extends "base.html" %}
{% block title %}HOOPS AI — Messages{% endblock %}
{% block nav_messages %}active{% endblock %}
{% block content %}
<div class="coach-messages">
  <!-- Sub-tabs -->
  <div class="msg-tabs">
    <div class="msg-tab active" onclick="switchCoachMsgTab('inbox')" data-i18n="messages.tab.inbox">Inbox</div>
    <div class="msg-tab" onclick="switchCoachMsgTab('sent')" data-i18n="messages.tab.sent">Sent</div>
    <div class="msg-tab" onclick="switchCoachMsgTab('compose')" data-i18n="messages.tab.compose">Compose</div>
  </div>

  <!-- Inbox -->
  <div class="msg-tab-content" id="coachMsgInbox">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
      <h3 style="font-size:16px;font-weight:600;" data-i18n="messages.tab.inbox">Inbox</h3>
      <button class="btn btn-secondary btn-sm" onclick="coachMarkAllRead()" data-i18n="messages.inbox.mark_all_read">Mark All Read</button>
    </div>
    <div class="msg-list" id="coachInboxList">
      <div class="loading-state" data-i18n="coach.messages.loading">Loading messages...</div>
    </div>
  </div>

  <!-- Sent -->
  <div class="msg-tab-content" id="coachMsgSent" style="display:none;">
    <h3 style="font-size:16px;font-weight:600;margin-bottom:12px;" data-i18n="coach.messages.sent_title">Sent Messages</h3>
    <div class="msg-list" id="coachSentList">
      <div class="loading-state" data-i18n="coach.messages.loading_short">Loading...</div>
    </div>
  </div>

  <!-- Compose -->
  <div class="msg-tab-content" id="coachMsgCompose" style="display:none;">
    <h3 style="font-size:16px;font-weight:600;margin-bottom:12px;" data-i18n="coach.messages.compose_title">Compose Message</h3>
    <div class="compose-form">
      <div class="form-group">
        <label data-i18n="coach.messages.field.send_to">Send to</label>
        <select class="input" id="coachComposeTarget">
          <option value="admin" data-i18n="messages.target.admin">Management</option>
          <option value="my_team_players" data-i18n="messages.target.my_team_players">Team Players</option>
          <option value="my_team_parents" data-i18n="messages.target.my_team_parents">Team Parents</option>
          <option value="my_team" data-i18n="messages.target.my_team">Entire Team</option>
        </select>
      </div>

      <div class="form-group">
        <label data-i18n="coach.messages.field.subject">Subject (optional)</label>
        <input type="text" class="input" id="coachComposeSubject" data-i18n-placeholder="coach.messages.field.subject_placeholder" placeholder="Subject...">
      </div>

      <div class="form-group">
        <label data-i18n="coach.messages.field.message">Message</label>
        <textarea class="input" id="coachComposeBody" rows="5" data-i18n-placeholder="coach.messages.field.message_placeholder" placeholder="Write your message..."></textarea>
      </div>

      <button class="btn btn-primary" onclick="sendCoachMessage()">
        <span class="material-symbols-outlined">send</span> <span data-i18n="btn.send">Send</span>
      </button>
    </div>
  </div>
</div>

<!-- Message Detail Modal -->
<div class="modal-overlay" id="coachMsgDetailModal">
  <div class="modal">
    <div class="modal-header">
      <h3 id="coachMsgDetailSubject" data-i18n="messages.detail.default_subject">Message</h3>
      <button class="btn-icon" onclick="closeModal('coachMsgDetailModal')">
        <span class="material-symbols-outlined">close</span>
      </button>
    </div>
    <div class="modal-body">
      <div class="msg-detail-meta" id="coachMsgDetailMeta"></div>
      <div class="msg-detail-body" id="coachMsgDetailBody" style="margin-top:12px;white-space:pre-wrap;"></div>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script src="/static/js/messages.js"></script>
{% endblock %}
